<div style="font-family: Arial, Helvetica, sans-serif; line-height: 1.5; color: #102033;">
  <div style="font-size: 18px; font-weight: 700; margin-bottom: 12px;">✅ Вопрос создан!</div>
  <div><strong>Проект:</strong> {{project.code}}</div>
  <div><strong>Номер:</strong> #{{question.id}}</div>
  <div><strong>Заголовок:</strong> {{question.question_title}}</div>
  <div><strong>Создал:</strong> {{actor.full_name}}</div>
  <div style="margin-top: 12px;"><strong>Текст вопроса:</strong></div>
  <div style="margin-top: 6px; white-space: pre-wrap;">{{question.question_text_plain}}</div>
  <div style="margin-top: 12px;"><a href="{{questionUrl}}" style="color: #0f5bd7; text-decoration: none;">{{questionUrl}}</a></div>
  <div style="margin-top: 16px; color: #64748b; font-size: 12px;"><em>Это автоматическое уведомление от {{company.name}}.</em></div>
</div>

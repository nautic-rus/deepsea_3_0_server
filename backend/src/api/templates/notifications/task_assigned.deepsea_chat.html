<div style="font-family: Arial, Helvetica, sans-serif; line-height: 1.5; color: #102033;">
  <div style="font-size: 18px; font-weight: 700; margin-bottom: 12px;">✅ Задача назначена!</div>
  <div><strong>Проект:</strong> {{project.code}}</div>
  <div><strong>Номер:</strong> #{{issue.id}}</div>
  <div><strong>Наименование:</strong> {{issue.title}}</div>
  <div><strong>Назначил:</strong> {{actor.full_name}}</div>
  <div><strong>Исполнитель:</strong> {{issue.assignee_name}}</div>
  <div style="margin-top: 12px;"><strong>Описание:</strong></div>
  <div style="margin-top: 6px; white-space: pre-wrap;">{{issue.description}}</div>
  <div style="margin-top: 12px;"><a href="{{issueUrl}}" style="color: #0f5bd7; text-decoration: none;">{{issueUrl}}</a></div>
  <div style="margin-top: 16px; color: #64748b; font-size: 12px;"><em>Это автоматическое уведомление от {{company.name}}.</em></div>
</div>

<div style="font-family: Arial, Helvetica, sans-serif; line-height: 1.5; color: #102033;">
  <div style="font-size: 18px; font-weight: 700; margin-bottom: 12px;">📝 Вопрос обновлён в проекте!</div>
  <div><strong>Проект:</strong> {{project.code}}</div>
  <div><strong>Номер:</strong> #{{question.id}}</div>
  <div><strong>Заголовок:</strong> {{question.question_title}}</div>
  <div><strong>Кто изменил:</strong> {{actor.full_name}}</div>
  <div style="margin-top: 12px;"><strong>Изменения:</strong></div>
  <pre style="white-space: pre-wrap; margin-top: 6px; padding: 12px; background: #f8fafc; border-left: 4px solid #0f5bd7; border-radius: 6px; overflow-x: auto;">{{changes}}</pre>
  <div style="margin-top: 12px;"><a href="{{questionUrl}}" style="color: #0f5bd7; text-decoration: none;">{{questionUrl}}</a></div>
  <div style="margin-top: 16px; color: #64748b; font-size: 12px;"><em>Автоматическое уведомление от {{company.name}}.</em></div>
</div>

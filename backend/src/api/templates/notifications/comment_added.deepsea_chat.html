<div style="font-family: Arial, Helvetica, sans-serif; line-height: 1.5; color: #102033;">
  <div style="font-size: 18px; font-weight: 700; margin-bottom: 12px;">➡️ Новый комментарий!</div>
  <div><strong>Проект:</strong> {{project.code}}</div>
  <div><strong>Объект:</strong> {{targetType}} #{{targetId}} {{document.code}} - {{targetTitle}}</div>
  <div><strong>Автор:</strong> {{actor.full_name}}</div>
  <div style="margin-top: 12px;"><strong>Комментарий:</strong></div>
  <div style="margin-top: 6px; white-space: pre-wrap;">{{message.content}}</div>
  <div style="margin-top: 12px;"><a href="{{targetUrl}}" style="color: #0f5bd7; text-decoration: none;">{{targetUrl}}</a></div>
  <div style="margin-top: 16px; color: #64748b; font-size: 12px;"><em>Это автоматическое уведомление от {{company.name}}.</em></div>
</div>

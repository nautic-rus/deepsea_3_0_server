services:
  deepsea-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepsea-chat
    environment:
      PORT: ${PORT:-3100}
      NODE_ENV: ${NODE_ENV:-development}
      CHAT_SERVICE_NAME: ${CHAT_SERVICE_NAME:-deepsea-chat}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-https://v3.deep-sea.ru}
      DB_HOST: ${DB_HOST:-chat-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-deepsea_chat}
      DB_USER: ${DB_USER:-deepsea_chat}
      DB_PASSWORD: ${DB_PASSWORD:-deepsea_chat}
      DB_SSL: ${DB_SSL:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3100:3100"
    depends_on:
      chat-db:
        condition: service_healthy
    restart: unless-stopped

  chat-db:
    image: postgres:16-alpine
    container_name: deepsea-chat-db
    environment:
      POSTGRES_DB: ${DB_NAME:-deepsea_chat}
      POSTGRES_USER: ${DB_USER:-deepsea_chat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-deepsea_chat}
    ports:
      - "5435:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-deepsea_chat} -d ${DB_NAME:-deepsea_chat}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  chat-db-data:

groups:
  - name: deepsea-alerts
    rules:
      - alert: HighProcessCPU
        expr: process_cpu_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High process CPU usage ({{ $value }}%)"

      - alert: HighProcessMemory
        expr: process_memory_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High process memory usage ({{ $value }}%)"

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{code=~"5.."}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated HTTP 5xx error rate"

      - alert: HighRequestRate
        expr: sum(rate(http_requests_total[1m])) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request rate across the application"

      - alert: BackendDown
        expr: up{job="deepsea-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down or not responding to /metrics"
          description: "Prometheus target for deepsea-backend is down (instance={{ $labels.instance }})."

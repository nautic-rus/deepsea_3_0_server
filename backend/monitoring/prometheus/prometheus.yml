global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'deepsea-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['89.108.125.21:3000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
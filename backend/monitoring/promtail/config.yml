server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: deepsea-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: deepsea
          container: "deepsea"
          stream: "app"
          __path__: /var/log/deepsea/*.log
      - targets: [localhost]
        labels:
          job: deepsea
          container: "deepsea"
          stream: "app"
          __path__: /home/spiridovich/deepsea_3_0_server/backend/logs/*.log
